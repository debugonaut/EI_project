<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Intelligence · Global Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #111214;
  --surface: #1a1c1f;
  --surface2: #222428;
  --surface3: #2a2d32;
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f2;
  --text2: #8a8f99;
  --text3: #555a63;
  --accent: #5bc4fa;
  --accent-soft: rgba(91,196,250,0.12);
  --green: #4ade80;
  --green-soft: rgba(74,222,128,0.12);
  --orange: #fb923c;
  --orange-soft: rgba(251,146,60,0.12);
  --red: #f87171;
  --red-soft: rgba(248,113,113,0.12);
  --yellow: #fbbf24;
  --radius: 14px;
  --radius-sm: 8px;
}

:root.light {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface2: #e8eaed;
  --surface3: #d8dce2;
  --border: rgba(0,0,0,0.08);
  --text: #111214;
  --text2: #4a5260;
  --text3: #8a9099;
  --accent: #0ea5d6;
  --accent-soft: rgba(14,165,214,0.10);
  --green: #16a34a;
  --orange: #ea6c1a;
  --red: #dc2626;
  --yellow: #d97706;
}

*, *::before, *::after { transition: background-color 0.25s ease, border-color 0.25s ease, color 0.15s ease; }

body {
  background: var(--bg);
  font-family: 'DM Sans', 'Inter', sans-serif;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── LAYOUT ─── */
.app { display: grid; grid-template-rows: 56px 1fr; height: 100vh; }

/* ─── TOPBAR ─── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky; top: 0; z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 20px; }
.app-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.location-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 14px; cursor: pointer;
  font-size: 13px; color: var(--text2); transition: border-color 0.2s;
}
.location-pill:hover { border-color: rgba(255,255,255,0.15); }
.location-pill .dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; }
.search-bar {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 6px 16px; width: 220px;
  font-size: 13px; color: var(--text3);
}
.topbar-right { display: flex; align-items: center; gap: 10px; }
.tab-group { display: flex; gap: 2px; background: var(--surface); border-radius: 20px; padding: 3px; }
.tab {
  padding: 5px 14px; border-radius: 16px; font-size: 12px; font-weight: 500;
  cursor: pointer; color: var(--text2); transition: all 0.2s;
}
.tab.active { background: var(--accent); color: #000; }
.icon-btn {
  width: 32px; height: 32px; border-radius: 8px; background: var(--surface);
  border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; color: var(--text2);
}

/* New Chart Styles */
.radar-chart { stroke: var(--accent); fill: var(--accent-soft); stroke-width: 1.5px; transition: all 0.3s; }
.radar-grid { stroke: var(--border); stroke-dasharray: 2 2; fill: none; }
.radar-label { font-size: 8px; fill: var(--text3); text-anchor: middle; }
.wind-compass { position: relative; width: 60px; height: 60px; margin: 0 auto; border-radius: 50%; border: 1px dashed var(--border); background: var(--surface); }
.wind-compass-inner { position: absolute; inset: 10px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); }
.wind-arrow { position: absolute; top: 50%; left: 50%; width: 2px; height: 30px; background: var(--accent); transform-origin: top center; z-index: 2; margin-left: -1px; }
.wind-arrow::after { content: ''; position: absolute; bottom: -4px; left: -3px; border-width: 4px 4px 0; border-style: solid; border-color: var(--accent) transparent transparent; }
.wind-label { position: absolute; font-size: 8px; font-weight: 600; color: var(--text3); }
.wind-label.n { top: -14px; left: 50%; transform: translateX(-50%); color: var(--text); }
.wind-label.s { bottom: -14px; left: 50%; transform: translateX(-50%); }
.wind-label.e { right: -14px; top: 50%; transform: translateY(-50%); }
.wind-label.w { left: -14px; top: 50%; transform: translateY(-50%); }

.gauge-svg { width: 100%; height: auto; transform: rotate(-90deg); }
.gauge-bg { fill: none; stroke: var(--surface3); stroke-width: 8; stroke-linecap: round; }
.gauge-fill { fill: none; stroke: url(#pressureGrad); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s ease-out; }
.gauge-text { fill: var(--text); font-size: 14px; font-weight: 600; text-anchor: middle; transform: rotate(90deg); transform-origin: center; }

.scatter-dot { opacity: 0.6; transition: r 0.2s, opacity 0.2s; cursor: pointer; }
.scatter-dot:hover { r: 5; opacity: 1; fill: var(--orange); }


.svg-icon { display: inline-flex; align-items: center; justify-content: center; width: 1em; height: 1em; }
.svg-icon svg { width: 100%; height: 100%; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.kisan-svg { font-size: 16px; display: inline-flex; align-items: center; justify-content: center; padding: 4px; border-radius: 5px; background: var(--surface2); }
/* End of new styles */
/* ─── MAIN CONTENT ─── */

.main { display: grid; grid-template-columns: 340px 1fr 280px; height: calc(100vh - 56px); overflow: hidden; }

/* ─── LEFT PANEL ─── */
.left-panel { border-right: 1px solid var(--border); overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 12px; }
.left-panel::-webkit-scrollbar { width: 4px; }
.left-panel::-webkit-scrollbar-track { background: transparent; }
.left-panel::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

/* Current weather card */
.current-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  position: relative;
  overflow: hidden;
  display: flex !important;
  flex-direction: column;
  flex-shrink: 0;
}
.current-card::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 140px; height: 140px; border-radius: 50%;
  background: radial-gradient(circle, rgba(91,196,250,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.current-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.current-city { font-size: 17px; font-weight: 600; }
.current-country { font-size: 12px; color: var(--text2); margin-top: 2px; }
.current-time { font-size: 11px; color: var(--text3); text-align: right; font-variant-numeric: tabular-nums; }
.current-temp-row { display: flex; align-items: flex-end; gap: 12px; margin-bottom: 14px; }
.current-temp { font-size: 52px; font-weight: 300; line-height: 1; letter-spacing: -2px; }
.current-temp sup { font-size: 22px; font-weight: 400; vertical-align: top; margin-top: 8px; }
.current-condition-block { padding-bottom: 4px; }
.current-condition { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
.feels-like { font-size: 12px; color: var(--text3); }

.current-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-chip {
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 10px 12px; display: flex; flex-direction: column; gap: 3px;
}
.stat-chip .lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-chip .val { font-size: 15px; font-weight: 500; }

/* Section label */
.section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; padding: 4px 4px 0; }

/* City list */
.city-list { display: flex; flex-direction: column; gap: 4px; }
.city-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border-radius: var(--radius-sm);
  cursor: pointer; transition: background 0.15s;
  border: 1px solid transparent;
}
.city-row:hover { background: var(--surface); border-color: var(--border); }
.city-row.active { background: var(--surface); border-color: rgba(91,196,250,0.3); }
.city-row-left { display: flex; align-items: center; gap: 10px; }
.city-cond-icon { font-size: 18px; width: 28px; text-align: center; }
.city-name-block .name { font-size: 13px; font-weight: 500; }
.city-name-block .cond { font-size: 11px; color: var(--text3); margin-top: 1px; }
.city-row-right { text-align: right; }
.city-row-right .temp { font-size: 17px; font-weight: 500; }
.city-row-right .country { font-size: 10px; color: var(--text3); margin-top: 1px; }

/* ─── CENTER PANEL ─── */
.center-panel { overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.center-panel::-webkit-scrollbar { width: 4px; }
.center-panel::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

/* Tabs row */
.view-tabs { display: flex; gap: 4px; }
.view-tab {
  padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 500;
  cursor: pointer; color: var(--text2); border: 1px solid transparent;
  transition: all 0.2s;
}
.view-tab.active { background: var(--accent-soft); color: var(--accent); border-color: rgba(91,196,250,0.25); }
.view-tab:hover:not(.active) { background: var(--surface); border-color: var(--border); }

/* Metrics grid */
.metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.metric-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.metric-card .m-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.metric-card .m-value { font-size: 24px; font-weight: 500; line-height: 1; margin-bottom: 4px; }
.metric-card .m-sub { font-size: 11px; color: var(--text3); }
.metric-card .m-bar { height: 3px; background: var(--surface3); border-radius: 2px; margin-top: 10px; overflow: hidden; }
.metric-card .m-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

/* Chart card */
.chart-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px;
}
.chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.chart-title { font-size: 13px; font-weight: 600; }
.chart-legend { display: flex; gap: 14px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); }
.legend-dot { width: 6px; height: 6px; border-radius: 50%; }

/* SVG chart */
.chart-wrap { position: relative; }
.chart-y-labels { position: absolute; left: 0; top: 0; bottom: 20px; display: flex; flex-direction: column; justify-content: space-between; }
.chart-y-labels span { font-size: 10px; color: var(--text3); font-variant-numeric: tabular-nums; }

/* Global map grid */
.map-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
.map-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.map-title { font-size: 13px; font-weight: 600; }
.map-dot-grid {
  position: relative; width: 100%; background: var(--surface2); border-radius: 10px; overflow: hidden;
}
.map-dot-grid svg { display: block; width: 100%; height: auto; }
.map-dot-grid .map-bg-img {
  transition: filter 0.3s ease;
}
:root:not(.light) .map-dot-grid .map-bg-img {
  filter: invert(1) brightness(0.65) opacity(0.5);
}
:root.light .map-dot-grid .map-bg-img {
  filter: opacity(0.4) brightness(0.9);
}
.map-dot-grid circle { cursor: pointer; transition: r 0.15s ease; }
.map-dot-grid circle:hover { r: 4; }
.map-dot-grid .dot-tooltip {
  position: absolute;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 5px; padding: 3px 7px; font-size: 9px; white-space: nowrap;
  pointer-events: none; opacity: 0; transition: opacity 0.15s;
  z-index: 20;
}


/* AQ table */
.aq-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.aq-table th { text-align: left; color: var(--text3); font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; padding: 0 0 10px; }
.aq-table td { padding: 8px 0; border-top: 1px solid var(--border); }
.aq-table tr:first-child td { border-top: none; }
.aq-pill {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 10px; font-weight: 600;
}

/* ─── RIGHT PANEL ─── */
.right-panel { border-left: 1px solid var(--border); overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; }
.right-panel::-webkit-scrollbar { width: 4px; }
.right-panel::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.rain-chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.rain-chart-header { display: flex; justify-content: space-between; margin-bottom: 14px; }
.rain-chart-title { font-size: 13px; font-weight: 600; }
.rain-bars { display: flex; align-items: flex-end; gap: 6px; height: 90px; }
.rain-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
.rain-bar-track { flex: 1; width: 100%; background: var(--surface2); border-radius: 4px; display: flex; align-items: flex-end; overflow: hidden; }
.rain-bar-fill { width: 100%; border-radius: 4px; transition: height 0.6s ease; }
.rain-bar-time { font-size: 9px; color: var(--text3); }

/* Sun timeline */
.sun-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.sun-arc-wrap { position: relative; padding: 12px 0; }
.sun-arc-svg { width: 100%; }
.sun-times { display: flex; justify-content: space-between; margin-top: 6px; }
.sun-time-block { text-align: center; }
.sun-time-block .label { font-size: 10px; color: var(--text3); }
.sun-time-block .time { font-size: 13px; font-weight: 500; margin-top: 2px; }

/* Moon card */
.moon-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; gap: 14px; align-items: center; }
.moon-visual { width: 52px; height: 52px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; border: 1px solid var(--border); }
.moon-info .phase { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.moon-info .illum { font-size: 11px; color: var(--text3); }
.moon-illum-bar { margin-top: 8px; height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.moon-illum-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #c4a8ff); border-radius: 2px; }

/* Ag advisory card */
.advisory-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.advisory-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
.advisory-items { display: flex; flex-direction: column; gap: 8px; }
.adv-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px; background: var(--surface2); border-radius: var(--radius-sm); }
.adv-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.adv-text { display: block; flex: 1; min-width: 0; }
.adv-text .adv-title { font-size: 11px; font-weight: 600; }
.adv-text .adv-desc { font-size: 10px; color: var(--text3); margin-top: 2px; line-height: 1.4; }

:root.light .current-card,
:root.light .metric-card,
:root.light .chart-card,
:root.light .map-section,
:root.light .rain-chart-card,
:root.light .sun-card,
:root.light .moon-card,
:root.light .advisory-card {
  box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
}
:root.light .topbar {
  box-shadow: 0 1px 0 rgba(0,0,0,0.08);
}
:root.light .location-pill:hover { border-color: rgba(0,0,0,0.15); }
:root.light .tab.active { color: #fff; }
:root.light input { color: var(--text2); }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="app-icon">🌐</div>
      <div class="location-pill" id="locationPill">
        <div class="dot"></div>
        <span id="topbarCity">New Delhi, India</span>
      </div>
      <div class="search-bar">
        <span>🔍</span>
        <input id="searchInput" placeholder="Search city..." style="background:none;border:none;outline:none;color:var(--text2);font-size:13px;width:100%" oninput="filterSearch(this.value)">
      </div>
    </div>
    <div class="topbar-right">
      <div class="tab-group">
        <div class="tab active" onclick="switchTab('forecast',this)">Forecast</div>
        <div class="tab" onclick="switchTab('airquality',this)">Air Quality</div>
      </div>
      <div class="icon-btn">⚙</div>
      <div class="icon-btn theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode" style="width:60px;border-radius:20px;padding:0 7px;display:flex;align-items:center;justify-content:space-between;gap:3px;cursor:pointer;">
        <span id="themeIconMoon" style="font-size:12px;transition:opacity 0.3s">🌙</span>
        <span style="width:20px;height:11px;background:var(--surface3);border-radius:6px;position:relative;flex-shrink:0;display:inline-block;border:1px solid var(--border)">
          <span id="themeKnob" style="position:absolute;top:1px;left:1px;width:7px;height:7px;background:var(--accent);border-radius:50%;transition:left 0.25s ease;display:block"></span>
        </span>
        <span id="themeIconSun" style="font-size:12px;opacity:0.4;transition:opacity 0.3s">☀️</span>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT -->
    <div class="left-panel">
      <div class="current-card" id="currentCard"></div>
      <div class="section-label">Other Cities</div>
      <div class="city-list" id="cityList"></div>
    </div>

    <!-- CENTER -->
    <div class="center-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="view-tabs">
          <div class="view-tab active" onclick="switchView('today',this)">Today</div>
          <div class="view-tab" onclick="switchView('week',this)">7 Days</div>
          <div class="view-tab" onclick="switchView('global',this)">Global Map</div>
        </div>
        <span style="font-size:11px;color:var(--text3)">Data: 2024-05-16 · 242 Stations</span>
      </div>

      <!-- Metrics Row -->
      <div class="metrics-grid" id="metricsGrid"></div>

      <!-- Chart -->
      <div class="chart-card" id="chartCard"></div>

      <!-- AQ / Map section -->
      <div id="extraSection"></div>
    </div>

    <!-- RIGHT -->
    <div class="right-panel" id="rightPanel"></div>

  </div>
</div>

<script src="./data_v2.js"></script>

const CONDITION_ICONS = {
  'Sunny': SVGS.sun, 'Clear': SVGS.moon, 'Partly cloudy': SVGS.cloudSun, 'Partly Cloudy': SVGS.cloudSun,
  'Cloudy': SVGS.cloud, 'Overcast': SVGS.cloud, 'Mist': SVGS.fog, 'Fog': SVGS.fog,
  'Light rain': SVGS.cloudRain, 'Light drizzle': SVGS.cloudRain, 'Patchy light rain': SVGS.cloudRain,
  'Moderate rain': SVGS.cloudRain, 'Heavy rain': SVGS.cloudRain, 'Patchy rain nearby': SVGS.cloudRain,
  'Patchy rain possible': SVGS.cloudRain, 'Light rain shower': SVGS.cloudRain,
  'Thundery outbreaks possible': SVGS.cloudLightning, 'Patchy light rain with thunder': SVGS.cloudLightning,
};
function getIcon(cond) {
  return `<span class="svg-icon">${CONDITION_ICONS[cond] || SVGS.sun}</span>`;
}


const AQI_LABELS = ['','Good','Moderate','Unhealthy (SG)','Unhealthy','Very Unhealthy','Hazardous'];
const AQI_COLORS = ['','#4ade80','#fbbf24','#fb923c','#f87171','#c084fc','#9f1239'];

let selectedCity = window.CITIES[0] || {};
let currentTab = 'forecast';
let currentView = 'today';

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderCenter();
}
function switchView(view, el) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderCenter();
}

function selectCity(city) {
  selectedCity = city;
  document.getElementById('topbarCity').textContent = `${city.city}, ${city.country}`;
  renderLeft();
  renderCenter();
  renderRight();
}

let searchTimeout;
function filterSearch(q) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const val = q.toLowerCase();
    const list = document.getElementById('cityList');
    list.innerHTML = '';
    
    if (val.length < 2) {
        renderCityList(window.CITIES.slice(0, 50));
        return;
    }
    
    // Performance optimization: Find top 50 matches without allocating huge arrays
    const matches = [];
    for (let c of window.CITIES) {
      if (c.city && c.city.toLowerCase().startsWith(val)) {
        matches.push(c);
        if (matches.length >= 50) break;
      }
    }
    renderCityList(matches);
  }, 250);
}

function renderCityList(displayCities) {
  const list = document.getElementById('cityList');
  list.innerHTML = '';
  
  displayCities.filter(c2 => c2.city !== selectedCity.city).forEach(c2 => {

    div.className = 'city-row';
    div.dataset.city = c2.city;
    div.innerHTML = `
      <div class="city-row-left">
        <span class="city-cond-icon">${getIcon(c2.condition)}</span>
        <div class="city-name-block">

          <div class="cond">${c2.condition}</div>
        </div>

      <div class="city-row-right">

// ── RENDER CENTER ──
function renderCenter() {
  const c = selectedCity;
  renderMetrics(c);
  renderChart(c);
  renderExtra(c);
}

function renderMetrics(c) {
  const heatIdx = Math.round(c.temp - 0.55 * (1 - c.humidity / 100) * (c.temp - 14.5));
  const visColor = c.visibility_mi < 1 ? 'var(--red)' : c.visibility_mi < 3 ? 'var(--yellow)' : 'var(--green)';
  const uvColor = c.uv >= 8 ? 'var(--red)' : c.uv >= 6 ? 'var(--orange)' : 'var(--green)';

  // Pressure gauge
  const pMin = 980, pMax = 1040;
  const pPct = Math.max(0, Math.min(1, (c.pressure - pMin) / (pMax - pMin)));
  const pCirc = 2 * Math.PI * 40;
  const pDash = pPct * pCirc * 0.75;
  const pRiskColor = c.pressure < 1000 ? 'var(--yellow)' : 'var(--green)';

  document.getElementById('metricsGrid').innerHTML = `
    <div class="metric-card">
      <div class="m-label">Heat Index</div>
      <div class="m-value" style="color:${heatIdx>40?'var(--red)':heatIdx>35?'var(--orange)':'var(--text)'}">${heatIdx}°C</div>
      <div class="m-sub">Feels ${heatIdx > c.temp ? 'hotter' : 'cooler'}</div>
      <div class="m-bar"><div class="m-bar-fill" style="width:${Math.min(100,(heatIdx/50)*100)}%;background:${heatIdx>40?'var(--red)':heatIdx>35?'var(--orange)':'var(--accent)'}"></div></div>
    </div>
    
    <div class="metric-card" style="display:flex; justify-content:space-between; align-items:center;">
      <div>
        <div class="m-label">Pressure</div>
        <div class="m-value" style="color:${pRiskColor}">${c.pressure} <span style="font-size:11px;color:var(--text3)">mb</span></div>
        <div class="m-sub">${c.pressure_in.toFixed(2)} inHg</div>
      </div>
      <div style="width: 50px; height: 50px; position:relative; margin-top:5px;">
        <svg viewBox="0 0 100 100" class="gauge-svg" style="width:50px; height:50px;">
          <defs>
            <linearGradient id="pressureGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="var(--yellow)" />
              <stop offset="100%" stop-color="var(--green)" />
            </linearGradient>
          </defs>
          <circle cx="50" cy="50" r="40" class="gauge-bg" stroke-dasharray="${pCirc*0.75} ${pCirc*0.25}" />
          <circle cx="50" cy="50" r="40" class="gauge-fill" stroke-dasharray="${pCirc}" stroke-dashoffset="${pCirc - pDash}" style="stroke-dasharray: ${pCirc*0.75} ${pCirc}; stroke-dashoffset: ${pCirc*0.75 - pDash}" />
        </svg>
      </div>
    </div>

    <div class="metric-card" style="display:flex; justify-content: space-between; align-items:center;">
      <div>
        <div class="m-label">Wind Direction</div>
        <div class="m-value">${c.wind_kph} <span style="font-size:12px;color:var(--text3)">kph</span></div>
        <div class="m-sub">Gust: ${c.gust_kph} kph</div>
      </div>
      <div class="wind-compass">
        <div class="wind-label n">N</div><div class="wind-label s">S</div>
        <div class="wind-label e">E</div><div class="wind-label w">W</div>
        <div class="wind-compass-inner"></div>
        <div class="wind-arrow" style="transform: rotate(${c.wind_deg}deg)"></div>
      </div>
    </div>

    <div class="metric-card">
      <div class="m-label">Visibility</div>
      <div class="m-value" style="color:${visColor}">${c.visibility_mi} <span style="font-size:13px;color:var(--text3)">mi</span></div>
      <div class="m-sub">${c.visibility_mi < 1 ? 'Very poor' : c.visibility_mi < 3 ? 'Reduced' : c.visibility_mi < 5 ? 'Moderate' : 'Clear'}</div>
      <div class="m-bar"><div class="m-bar-fill" style="width:${Math.min(100,(c.visibility_mi/10)*100)}%;background:${visColor}"></div></div>
    </div>
  `;
}

function renderChart(c) {
  // Simulate 24h temperature/humidity using real values as base
  const baseTemp = c.temp;
  const baseHum = c.humidity;
  const hours = Array.from({length:24}, (_,i) => i);
  const tempData = hours.map(h => {
    const offset = -5 * Math.cos((h - 14) * Math.PI / 12);
    return +(baseTemp + offset + (Math.random()-0.5)*1.5).toFixed(1);
  });
  const humData = hours.map(h => {
    const offset = 10 * Math.cos((h - 14) * Math.PI / 12);
    return Math.min(100, Math.max(10, Math.round(baseHum + offset + (Math.random()-0.5)*5)));
  });

  const minT = Math.min(...tempData) - 2;
  const maxT = Math.max(...tempData) + 2;
  const W = 520, H = 120;
  const xStep = W / 23;

  const tempPoints = tempData.map((t,i) => `${i*xStep},${H - ((t-minT)/(maxT-minT))*H}`).join(' ');
  const humPoints = humData.map((h2,i) => `${i*xStep},${H - (h2/100)*H}`).join(' ');
  const tempFill = tempData.map((t,i) => `${i*xStep},${H - ((t-minT)/(maxT-minT))*H}`).join(' ');

  const showHours = [0,3,6,9,12,15,18,21,23];

  document.getElementById('chartCard').innerHTML = `
    <div class="chart-header">
      <div class="chart-title">24-Hour Profile — ${c.city}</div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Temperature</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Humidity</div>
      </div>
    </div>
    <svg viewBox="-30 0 ${W+40} ${H+30}" style="width:100%;overflow:visible">
      <defs>
        <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#5bc4fa" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#5bc4fa" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <!-- Grid lines -->
      ${[0,0.25,0.5,0.75,1].map(f => `
        <line x1="0" y1="${H*f}" x2="${W}" y2="${H*f}" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
        <text x="-5" y="${H*f+4}" text-anchor="end" font-size="9" fill="#555a63">${Math.round(maxT - f*(maxT-minT))}°</text>
      `).join('')}
      <!-- Temp area fill -->
      <polygon points="${tempFill} ${W},${H} 0,${H}" fill="url(#tg)"/>
      <!-- Temp line -->
      <polyline points="${tempPoints}" fill="none" stroke="#5bc4fa" stroke-width="1.8" stroke-linejoin="round"/>
      <!-- Humidity line -->
      <polyline points="${humPoints}" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linejoin="round" stroke-dasharray="3,2"/>
      <!-- X labels -->
      ${showHours.map(h => `<text x="${h*xStep}" y="${H+16}" text-anchor="middle" font-size="9" fill="#555a63">${h.toString().padStart(2,'0')}h</text>`).join('')}
    </svg>
  `;
}

function renderExtra(c) {
  if (currentTab === 'airquality') {
    // Air quality breakdown Radar Chart for this city
    const maxVals = { pm25: 50, pm10: 100, no2: 50, o3: 100, co: 1000, so2: 50 };
    const pols = ['pm25', 'pm10', 'no2', 'o3', 'co', 'so2'];
    const angles = pols.map((_, i) => (Math.PI * 2 * i) / pols.length - Math.PI/2);
    
    let radarPoints = '';
    const cx = 100, cy = 100, r = 70;
    
    pols.forEach((p, i) => {
      let val = (c[p] || 0) / maxVals[p];
      val = Math.min(1, Math.max(0.1, val));
      const px = cx + r * val * Math.cos(angles[i]);
      const py = cy + r * val * Math.sin(angles[i]);
      radarPoints += `${px},${py} `;
    });
    
    // Grid polygons
    const grids = [0.33, 0.66, 1].map(scale => {
      let pts = pols.map((_, i) => `${cx + r * scale * Math.cos(angles[i])},${cy + r * scale * Math.sin(angles[i])}`).join(' ');
      return `<polygon points="${pts}" class="radar-grid" />`;
    }).join('');

    const Labels = pols.map((p, i) => {
      const lx = cx + (r+20) * Math.cos(angles[i]);
      const ly = cy + (r+15) * Math.sin(angles[i]);
      return `<text x="${lx}" y="${ly}" class="radar-label">${p.toUpperCase()} (${c[p]||0})</text>`;
    }).join('');

    const sorted = [...window.CITIES].sort((a,b) => b.pm25 - a.pm25).slice(0,10);

    document.getElementById('extraSection').innerHTML = `

                  <td><span class="aq-pill" style="background:${AQI_COLORS[city.aqi]||'#4ade80'}22;color:${AQI_COLORS[city.aqi]||'#4ade80'}">${AQI_LABELS[city.aqi]||'Good'}</span></td>
                </tr>
              `).join('')}
            </tbody>

    document.getElementById('extraSection').innerHTML = `
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">

      const condList = ['Sunny','Partly cloudy','Light rain','Cloudy','Overcast'];
      const cond = condList[Math.floor(Math.random()*condList.length)];
      return `
        <div class="metric-card" style="text-align:center;cursor:pointer">
          <div class="m-label" style="text-align:center">${d}</div>
          <div style="font-size:24px;margin:8px 0">${getIcon(cond)}</div>
          <div style="font-size:18px;font-weight:500">${t}°</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">${lo}° low</div>
          <div style="font-size:10px;color:var(--text3);margin-top:4px">${cond}</div>
        </div>
      `;
    }).join('');
    document.getElementById('extraSection').innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px">${cards}</div>
    `;
  }
}

function renderRight() {
  const c = selectedCity;

  // Rain bars — simulate hourly precip but use precise precip_in
  const rainHours = ['10AM','11AM','12PM','1PM','2PM','3PM'];
  const baseRain = c.precip > 0 ? c.precip * 5 : 0;
  const rainVals = [20, 35, 55, 80, 60, 40].map(v => v + baseRain + Math.random()*10);
  const maxRain = Math.max(...rainVals);
  const rainBars = rainHours.map((h,i) => {
    const pct = (rainVals[i] / maxRain) * 100;
    const col = pct > 70 ? 'var(--red)' : pct > 45 ? 'var(--accent)' : 'var(--surface3)';
    return `<div class="rain-bar-wrap">
      <div class="rain-bar-track"><div class="rain-bar-fill" style="height:${pct}%;background:${col}"></div></div>
      <div class="rain-bar-time">${h}</div>
    </div>`;
  }).join('');

  // Sun arc SVG
  const parseTime = str => { const [hm,ap] = str.split(' '); let [h,m] = hm.split(':').map(Number); if(ap==='PM'&&h!==12) h+=12; if(ap==='AM'&&h===12) h=0; return h*60+m; };
  const srMin = c.sunrise.includes(':') ? parseTime(c.sunrise) : 360;
  const ssMin = c.sunset.includes(':') ? parseTime(c.sunset) : 1080;
  
  const totalDay = ssMin - srMin;
  const nowMin = 14 * 60; // simulate 2pm
  const prog = Math.max(0, Math.min(1, (nowMin - srMin) / totalDay));
  const angle = Math.PI * (1 - prog);
  const cx = 120, cy = 70, r = 55;
  const sunX = cx + r * Math.cos(angle);
  const sunY = cy - r * Math.sin(angle);

  // Moon phase + rise/set
  const moonIcons = {'New Moon':'🌑','Waxing Crescent':'🌒','First Quarter':'🌓','Waxing Gibbous':'🌔','Full Moon':'🌕','Waning Gibbous':'🌖','Last Quarter':'🌗','Waning Crescent':'🌘'};
  const moonIcon = moonIcons[c.moon_phase] || '🌙';
  const illumPct = parseInt(c.moon_illum) || 50;

  // Ag advisory
  const sprayOk = c.wind_mph < 10 && c.humidity > 50;
  const irrigate = c.precip_in < 0.1 && c.humidity < 60;

  document.getElementById('rightPanel').innerHTML = `
    <!-- Rain Precipitation -->
    <div class="rain-chart-card">
      <div class="rain-chart-header">
        <div class="rain-chart-title">Chance of Rain</div>
        <span style="font-size:11px;color:var(--accent)">${c.precip_in.toFixed(2)} in</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        ${['Heavy','Moderate','Light'].map(l => `<span style="font-size:10px;color:var(--text3)">${l}</span>`).join('')}
      </div>
      <div class="rain-bars">${rainBars}</div>
    </div>

    <!-- Cloud & Air Temp -->
    <div style="display:flex; gap:16px; margin-bottom:16px">
      <!-- Thermometer -->
      <div class="rain-chart-card" style="flex:1; margin-bottom:0; display:flex; flex-direction:column; justify-content:center;">
        <div style="display:flex; align-items:center; gap:8px">
          <div class="svg-icon" style="color:var(--orange); font-size:24px">${SVGS.thermometer}</div>
          <div>
            <div style="font-size:11px; color:var(--text3)">Temperature</div>
            <div style="font-size:16px; font-weight:600">${c.temp}°C</div>
            <div style="font-size:11px; color:var(--text3)">Feels: ${c.feels}°C</div>
          </div>
        </div>
      </div>
      <!-- Cloud Cover -->
      <div class="rain-chart-card" style="flex:1; margin-bottom:0; display:flex; flex-direction:column; justify-content:center;">
        <div style="display:flex; align-items:center; gap:8px">
          <div class="svg-icon" style="color:var(--accent); font-size:24px">${SVGS.cloud}</div>
          <div>
            <div style="font-size:11px; color:var(--text3)">Cloud Cover</div>
            <div style="font-size:16px; font-weight:600">${c.cloud}%</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Sun Timeline -->
    <div class="sun-card">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px"><span class="svg-icon" style="color:#fbbf24">${SVGS.sun}</span> Sun & Daylight</div>
      <svg class="sun-arc-svg" viewBox="0 0 240 80" style="width:100%">
        <path d="M ${cx-r},${cy} A ${r},${r} 0 0 1 ${cx+r},${cy}" fill="none" stroke="rgba(251,191,36,0.15)" stroke-width="2"/>
        <circle cx="${sunX}" cy="${sunY}" r="7" fill="#fbbf24" opacity="0.9"/>
        <circle cx="${sunX}" cy="${sunY}" r="12" fill="rgba(251,191,36,0.15)"/>
        <text x="${cx-r}" y="${cy+14}" text-anchor="middle" font-size="9" fill="#8a8f99">Rise</text>
        <text x="${cx+r}" y="${cy+14}" text-anchor="middle" font-size="9" fill="#8a8f99">Set</text>
      </svg>
      <div class="sun-times">
        <div class="sun-time-block"><div class="label">Sunrise</div><div class="time">${c.sunrise.replace(' AM',' am')}</div></div>
        <div class="sun-time-block"><div class="label">Daylight</div><div class="time">${Math.floor(totalDay/60)}h ${totalDay%60}m</div></div>
        <div class="sun-time-block"><div class="label">Sunset</div><div class="time">${c.sunset.replace(' PM',' pm')}</div></div>
      </div>
    </div>

    <!-- Moon -->
    <div class="moon-card" style="flex-wrap:wrap">
      <div class="moon-visual"><span class="svg-icon">${SVGS.moon}</span></div>
      <div class="moon-info" style="flex:1; min-width: 120px;">
        <div class="phase">${c.moon_phase}</div>
        <div class="illum">${illumPct}% illuminated</div>
        <div class="moon-illum-bar"><div class="moon-illum-fill" style="width:${illumPct}%"></div></div>
      </div>
      <div style="width: 100%; display:flex; justify-content:space-between; margin-top:10px; font-size:11px; color:var(--text3); border-top:1px solid var(--border); padding-top:8px;">
        <div><span>Rise:</span> <span style="color:var(--text)">${c.moonrise || '--:--'}</span></div>
        <div><span>Set:</span> <span style="color:var(--text)">${c.moonset || '--:--'}</span></div>
      </div>
    </div>

    <!-- Health & Comfort Advisory -->
    <div class="advisory-card">
      <div class="advisory-title" style="display:flex;align-items:center;gap:6px"><span class="svg-icon" style="color:var(--accent)">${SVGS.alert}</span> Health & Comfort</div>
      <div class="advisory-items">
        <div class="adv-item">
          <div class="kisan-svg" style="color:${c.aqi>3?'var(--red)':c.aqi>2?'var(--orange)':'var(--green)'}"><span class="svg-icon">${c.aqi>3 ? SVGS.alert : SVGS.leaf}</span></div>
          <div class="adv-text">
            <div class="adv-title" style="color:${c.aqi>3?'var(--red)':c.aqi>2?'var(--orange)':'var(--green)'}">Air Quality: ${AQI_LABELS[c.aqi] || 'Good'}</div>
            <div class="adv-desc">PM2.5: ${c.pm25} · ${c.aqi>3?'Reduce outdoor exertion':'Ideal conditions for outdoors'}</div>
          </div>
        </div>
        <div class="adv-item">
          <div class="kisan-svg" style="color:${c.uv>=8?'var(--red)':'var(--yellow)'}"><span class="svg-icon">${SVGS.sun}</span></div>
          <div class="adv-text">
            <div class="adv-title" style="color:${c.uv>=8?'var(--red)':'var(--text)'}">UV Exposure: ${c.uv>=8?'Very High':c.uv>=5?'High':'Moderate'}</div>
            <div class="adv-desc">Index: ${c.uv} · ${c.uv>=8?'Protection essential (Hat, SPF 50)':'Use sun protection if outside'}</div>
          </div>
        </div>
        <div class="adv-item">
          <div class="kisan-svg" style="color:${c.feels>35?'var(--orange)':c.feels<10?'#5bc4fa':'var(--green)'}"><span class="svg-icon">${SVGS.thermometer}</span></div>
          <div class="adv-text">
            <div class="adv-title" style="color:${c.feels>35?'var(--orange)':c.feels<10?'#5bc4fa':'var(--green)'}">Thermal Stress: ${c.feels>35?'High Heat':c.feels<10?'Cold':'Comfortable'}</div>
            <div class="adv-desc">Feels like ${Math.round(c.feels)}°C · ${c.feels>35?'Stay hydrated':c.feels<10?'Dress warmly':'No thermal stress'}</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ── THEME TOGGLE ──
let isDark = true;
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.classList.toggle('light', !isDark);
  const knob = document.getElementById('themeKnob');
  const moon = document.getElementById('themeIconMoon');
  const sun  = document.getElementById('themeIconSun');
  if (!isDark) {
    knob.style.left = '10px';
    moon.style.opacity = '0.4';
    sun.style.opacity  = '1';
  } else {
    knob.style.left = '1px';
    moon.style.opacity = '1';
    sun.style.opacity  = '0.4';
  }
}

// ── INIT ──
renderLeft();
renderCenter();
renderRight();
</script>
</body>
</html>
